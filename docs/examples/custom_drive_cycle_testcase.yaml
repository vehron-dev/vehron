testcase:
  name: "Custom drive cycle demo"
  description: "Example testcase using the public drive-cycle CSV route format"

environment:
  ambient_temp_c: 25.0
  wind_speed_ms: 0.0
  wind_angle_deg: 0.0
  solar_irradiance_wm2: 0.0

route:
  mode: drive_cycle
  distance_km: 5.0
  grade_pct: 0.0
  target_speed_kmh: 0.0
  drive_cycle_file: docs/examples/custom_drive_cycle.csv

payload:
  passengers: 1
  passenger_mass_kg: 75.0
  cargo_kg: 0.0

simulation:
  dt_s: 0.1
  max_duration_s: 600.0
  stop_on_soc_min: true

outputs:
  time_series: true
  energy_audit: true
  plots: [speed, soc, temperatures]
  report: true
