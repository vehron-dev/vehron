testcase:
  name: "City WLTP-like stop-start"
  description: "Urban cycle with accelerations and decelerations for regen visibility"

environment:
  ambient_temp_c: 28.0
  wind_speed_ms: 0.0
  wind_angle_deg: 0.0

route:
  mode: drive_cycle
  distance_km: 8.0
  grade_pct: 0.0
  target_speed_kmh: 0.0
  drive_cycle_file: data/drive_cycles/wltp_class3.csv

payload:
  passengers: 1
  cargo_kg: 10.0

simulation:
  dt_s: 0.2
  max_duration_s: 1800
  stop_on_soc_min: true
  external_charging_power_kw: 0.0
  external_charging_start_s: 0.0
  external_charging_end_s: 0.0

outputs:
  time_series: true
  energy_audit: true
  plots: [speed, soc, power_split]
  report: false
